<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>温馨提示</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 205, 220, 0.45), transparent 28%),
        radial-gradient(circle at 80% 72%, rgba(255, 241, 176, 0.42), transparent 28%),
        linear-gradient(135deg, #fff7fb 0%, #f8fcff 48%, #fff8ed 100%);
      color: #3d2632;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      user-select: none;
      touch-action: manipulation;
    }

    .stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    .topbar {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      left: 50%;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      width: min(92vw, 440px);
      padding: 8px;
      border: 1px solid rgba(150, 77, 106, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 10px 28px rgba(104, 43, 70, 0.12);
      transform: translateX(-50%);
      backdrop-filter: blur(12px);
    }

    button {
      flex: 1;
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      background: #c9366f;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
    }

    button.secondary {
      flex: 0 0 88px;
      background: #ffffff;
      color: #8d3455;
      border: 1px solid rgba(141, 52, 85, 0.22);
    }

    .tip {
      position: absolute;
      display: grid;
      place-items: center;
      width: var(--tip-width);
      height: var(--tip-height);
      padding: 10px 14px;
      border: 1px solid rgba(118, 49, 78, 0.12);
      border-radius: 8px;
      box-shadow: 0 10px 22px rgba(112, 42, 76, 0.15);
      color: #3a2630;
      font-size: clamp(13px, 3.5vw, 17px);
      font-weight: 700;
      line-height: 1.25;
      text-align: center;
      animation: popIn 180ms ease-out both, fadeOut 700ms ease-in forwards;
      animation-delay: 0ms, 4.2s;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.72);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: scale(0.9);
      }
    }

    @media (max-width: 520px) {
      .topbar {
        width: calc(100vw - 20px);
      }
    }
  </style>
</head>
<body>
  <main class="stage" id="stage"></main>
  <div class="topbar">
    <button type="button" id="startBtn">开始</button>
    <button type="button" class="secondary" id="clearBtn">清空</button>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const startBtn = document.getElementById("startBtn");
    const clearBtn = document.getElementById("clearBtn");

    const tips = [
      "多喝水哦~",
      "保持微笑 :)",
      "注意休息，别熬夜~",
      "放松一下眼睛",
      "今天也要元气满满！",
      "愿你每天开心",
      "好好吃饭",
      "别忘了开心"
    ];

    const colors = [
      "#fff7b8",
      "#f5c0e6",
      "#ffb099",
      "#ffe4bf",
      "#ffd9e4",
      "#e5ffd9",
      "#f7d9ff",
      "#d9f3ff"
    ];

    let timers = [];
    let running = false;

    function getPopupSize() {
      const width = Math.min(168, Math.max(118, window.innerWidth * 0.32));
      const height = Math.min(62, Math.max(48, window.innerHeight * 0.08));
      return { width, height };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(value, max));
    }

    function randomItem(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function addTimer(callback, delay) {
      const id = window.setTimeout(callback, delay);
      timers.push(id);
      return id;
    }

    function createTip(x, y) {
      const { width, height } = getPopupSize();
      const tip = document.createElement("div");
      tip.className = "tip";
      tip.textContent = randomItem(tips);
      tip.style.setProperty("--tip-width", `${width}px`);
      tip.style.setProperty("--tip-height", `${height}px`);
      tip.style.left = `${clamp(x, 0, window.innerWidth - width)}px`;
      tip.style.top = `${clamp(y, 0, window.innerHeight - height)}px`;
      tip.style.background = randomItem(colors);
      stage.appendChild(tip);
      addTimer(() => tip.remove(), 5000);
    }

    function buildHeartPoints(count) {
      const { width, height } = getPopupSize();
      const safeTop = 74;
      const centerX = window.innerWidth / 2;
      const centerY = safeTop + (window.innerHeight - safeTop) / 2;
      const scale = Math.min(window.innerWidth, window.innerHeight - safeTop) / 38;
      const points = [];

      for (let i = 0; i < count; i += 1) {
        const t = Math.PI * 2 * i / count;
        const x = 16 * Math.sin(t) ** 3;
        const y =
          13 * Math.cos(t) -
          5 * Math.cos(2 * t) -
          2 * Math.cos(3 * t) -
          Math.cos(4 * t);

        points.push({
          x: centerX + x * scale - width / 2,
          y: centerY - y * scale - height / 2
        });
      }

      return points;
    }

    function clearAll() {
      timers.forEach((id) => window.clearTimeout(id));
      timers = [];
      running = false;
      stage.innerHTML = "";
      startBtn.textContent = "开始";
    }

    function runSequence() {
      clearAll();
      running = true;
      startBtn.textContent = "重新开始";

      const heartCount = window.innerWidth < 520 ? 72 : 120;
      const randomCount = window.innerWidth < 520 ? 70 : 120;
      const heartPoints = buildHeartPoints(heartCount);
      const heartInterval = window.innerWidth < 520 ? 65 : 45;
      const randomInterval = window.innerWidth < 520 ? 95 : 80;

      heartPoints.forEach((point, index) => {
        addTimer(() => {
          if (running) createTip(point.x, point.y);
        }, index * heartInterval);
      });

      const randomStart = heartPoints.length * heartInterval + 550;
      for (let i = 0; i < randomCount; i += 1) {
        addTimer(() => {
          if (!running) return;
          const { width, height } = getPopupSize();
          const x = Math.random() * (window.innerWidth - width);
          const y = 74 + Math.random() * Math.max(1, window.innerHeight - 74 - height);
          createTip(x, y);
        }, randomStart + i * randomInterval);
      }

      addTimer(() => {
        running = false;
        startBtn.textContent = "开始";
      }, randomStart + randomCount * randomInterval + 5200);
    }

    startBtn.addEventListener("click", runSequence);
    clearBtn.addEventListener("click", clearAll);
    window.addEventListener("resize", clearAll);

    addTimer(runSequence, 300);
  </script>
</body>
</html>
